  let elapsed = millis() - cycleStartTime;
  let fadeOutStart = CYCLE_DURATION - 2000;
  
  if (elapsed > CYCLE_DURATION) {
    initSystem();
    cycleStartTime = millis();
  }

  if (bgImg && bgImg.width > 1) {
    push();
    if (controls.get('blur') > 0) {
      drawingContext.filter = `blur(${controls.get('blur')}px)`;
    }
    let imgAspect = bgImg.width / bgImg.height;
    let canvasAspect = width / height;
    let dw, dh, dx, dy;
    if (canvasAspect > imgAspect) {
      dw = width; dh = width / imgAspect; dx = 0; dy = (height - dh) / 2;
    } else {
      dh = height; dw = height * imgAspect; dx = (width - dw) / 2; dy = 0;
    }
    image(bgImg, dx, dy, dw, dh);
    pop();
  }

  if (elapsed > fadeOutStart) {
    let alpha = map(elapsed, fadeOutStart, CYCLE_DURATION, 0, 255);
    fill(15, alpha);
    noStroke();
    rect(0, 0, width, height);
  }

  if (controls.get('play')) {
    let speed = controls.get('speed') || 2;
    growthTimer += speed * 0.15;
    
    if (growthTimer > 1) {
      plants.forEach(p => {
        if (p.nodes.length < (controls.get('density') || 300)) {
          p.grow();
        }
      });
      growthTimer = 0;
    }
  }

  plants.forEach(p => p.update());
  plants.forEach(p => p.display());

  // Debug motion grid (subtle pixels)
  if (controls.get('camera_interaction')) {
    const cellW = width / gridCols;
    const cellH = height / gridRows;
    noStroke();
    for (let gy = 0; gy < gridRows; gy++) {
      for (let gx = 0; gx < gridCols; gx++) {
        let val = motionGrid[gy * gridCols + gx];
        if (val > 0.5) {
          fill(255, map(val, 0.5, 10, 0, 40));
          // Draw small pixels instead of full grid cells
          rect(gx * cellW + cellW/2, gy * cellH + cellH/2, 1.5, 1.5);
        }
      }
    }
  }
}

function mousePressed() {
  AudioEngine.init();
  AudioEngine.resume();
  if (mouseY > height * 0.8) {
    plants.push(new Plant(mouseX, height));
  }
}

class Plant {
  constructor(x, y) {
    this.nodes = [];
    let root = new Node(x, y, null, '', 0);
    root.angle = -PI / 2;
    this.nodes.push(root);
  }

  grow() {
    let content = controls.get('text') || '(liebestod*¨][*¨+´+´+)';
    let chaos = (controls.get('noise_strength') || 30) / 100;
    
    let parent;
    if (this.nodes.length < 12) {
      parent = this.nodes[this.nodes.length - 1];
    } else {
      let idx = floor(random(max(0, this.nodes.length - 30), this.nodes.length));
      parent = this.nodes[idx];
    }
    
    if (parent.depth > 60) return;

    let noiseVal = noise(parent.pos.x * 0.01, parent.pos.y * 0.01, this.nodes.length * 0.05);
    let angle = parent.angle + (noiseVal - 0.5) * chaos * PI;
    
    if (parent.depth < 10) {
      angle = lerp(angle, -PI / 2, 0.85);
    }

    let len = random(15, 35);
    let x = parent.pos.x + cos(angle) * len;
    let y = parent.pos.y + sin(angle) * len;
    
    if (x < -100 || x > width + 100 || y < -100 || y > height + 100) return;

    let char = content[this.nodes.length % content.length];
    let newNode = new Node(x, y, parent, char, parent.depth + 1);
    newNode.angle = angle;
    
    parent.isTerminal = false;
    this.nodes.push(newNode);
    
    AudioEngine.playDrop();
  }

  update() {
    this.nodes.forEach(n => n.update());
  }

  display() {
    this.nodes.forEach(n => n.drawBranch());
    this.nodes.forEach(n => n.drawLetter());
  }
}

class Node {
  constructor(x, y, parent, char, depth) {
    this.pos = createVector(x, y);
    this.basePos = this.pos.copy();
    this.parent = parent;
    this.char = char;
    this.depth = depth;
    this.angle = -PI / 2;
    this.size = 0;
    this.isTerminal = true;
    this.bloomScale = 0;
    this.hasBloomed = false;
    this.cursorOver = false;
    
    let baseSize = controls.get('font_size') || 32;
    this.targetSize = map(depth, 1, 60, baseSize, baseSize * 0.3);
    this.offset = createVector(0, 0);
    
    if (typeof gsap !== 'undefined') {
      gsap.to(this, {
        size: this.targetSize,
        duration: 1.5,
        ease: "elastic.out(1, 0.5)"
      });
    } else {
      this.size = this.targetSize;
    }
  }

  update() {
    let windStr = (controls.get('wind_strength') || 120) / 100;
    let windEffect = createVector(0, 0);

    // Mouse Interaction
    let mousePos = createVector(mouseX, mouseY);
    let distToMouse = p5.Vector.dist(this.pos, mousePos);
    if (distToMouse < 400) {
      let mEffect = p5.Vector.sub(this.pos, mousePos);
      mEffect.normalize();
      let force = map(distToMouse, 0, 400, windStr * 250, 0);
      windEffect.add(mEffect.mult(force));
    }

    // Hand Interaction (Grid-based)
    if (controls.get('camera_interaction')) {
      let gx = Math.floor(constrain(map(this.pos.x, 0, width, 0, gridCols - 1), 0, gridCols - 1));
      let gy = Math.floor(constrain(map(this.pos.y, 0, height, 0, gridRows - 1), 0, gridRows - 1));
      let motion = motionGrid[gy * gridCols + gx];
      let sensitivity = controls.get('hand_sensitivity') || 1;
      
      if (motion > 0.1) {
        let push = createVector(this.pos.x - width/2, this.pos.y - height/2);
        push.normalize();
        windEffect.add(push.mult(motion * windStr * 50 * sensitivity));
        AudioEngine.playShimmer();
      }
    }
    
    let time = frameCount * 0.06; 
    let noiseScale = 0.008;
    let depthFactor = pow(this.depth / 10, 1.5); 
    let turbulence = windStr * 60 * depthFactor;
    
    let swayX = (noise(this.basePos.x * noiseScale, this.basePos.y * noiseScale, time) - 0.5) * turbulence;
    let swayY = (noise(this.basePos.x * noiseScale + 1000, this.basePos.y * noiseScale, time + 100) - 0.5) * (turbulence * 0.6);
    
    let whip = sin(frameCount * 0.2 + this.depth) * (windStr * 5 * depthFactor);
    swayX += whip;
    swayY += whip * 0.5;
    
    let targetOffset = createVector(swayX + windEffect.x, swayY + windEffect.y);
    this.offset.lerp(targetOffset, 0.12); 
    this.pos = p5.Vector.add(this.basePos, this.offset);

    if (this.isTerminal && this.depth > 15) {
      if (!this.hasBloomed && this.bloomScale > 0.5) {
        AudioEngine.playBell();
        this.hasBloomed = true;
        this.lastRung = millis();
      }
      this.bloomScale = lerp(this.bloomScale, 1, 0.05);
    }
  }

  drawBranch() {
    if (!this.parent || this.depth === 0) return;
    stroke(255, 60);
    if (controls.get('color_mode') === 'Natural' && bgImg && bgImg.width > 1) {
      let imgX = floor(constrain(map(this.basePos.x, 0, width, 0, bgImg.width), 0, bgImg.width - 1));
      let imgY = floor(constrain(map(this.basePos.y, 0, height, 0, bgImg.height), 0, bgImg.height - 1));
      let c = bgImg.get(imgX, imgY);
      if (c && alpha(c) > 0) stroke(red(c), green(c), blue(c), 100);
    }
    strokeWeight(map(this.depth, 1, 60, 5, 0.5));
    line(this.pos.x, this.pos.y, this.parent.pos.x, this.parent.pos.y);
  }

  drawLetter() {
    if (this.size < 0.1 || !this.char) return;
    
    push();
    translate(this.pos.x, this.pos.y);
    rotate(this.angle + PI/2);
    
    let col = color(controls.get('text_color') || '#ffffff');
    if (controls.get('color_mode') === 'Natural' && bgImg && bgImg.width > 1) {
      let imgX = floor(constrain(map(this.basePos.x, 0, width, 0, bgImg.width), 0, bgImg.width - 1));
      let imgY = floor(constrain(map(this.basePos.y, 0, height, 0, bgImg.height), 0, bgImg.height - 1));
      let sampled = bgImg.get(imgX, imgY);
      if (sampled && alpha(sampled) > 0) col = sampled;
    }

    noStroke();
    fill(col);
    textSize(this.size);
    text(this.char, 0, 0);

    if (this.isTerminal && this.bloomScale > 0.01) {
      this.drawFlower(col);
    }
    pop();
  }

  drawFlower(col) {
    let petals = 6;
    let fSize = controls.get('flower_size') || 0.8;
    let radius = (controls.get('font_size') || 32) * fSize * this.bloomScale;
    let content = controls.get('text') || '(liebestod*¨][*¨+´+´+)';
    
    push();
    for (let i = 0; i < petals; i++) {
      rotate(TWO_PI / petals);
      fill(red(col), green(col), blue(col), 200 * this.bloomScale);
      textSize(this.size * fSize * this.bloomScale);
      text(content[i % content.length], radius, 0);
      fill(255, 200 * this.bloomScale);
      rectMode(CENTER);
      rect(0, 0, 1.5 * this.bloomScale, 1.5 * this.bloomScale);
      rectMode(CORNER);
    }
    pop();
  }
}

function handleImage() {
  let url = controls.get('image');
  if (url && url !== lastImgUrl) {
    lastImgUrl = url;
    bgImg = loadImage(url);
  }
}

function windowResized() {
  const area = document.querySelector('.tool-canvas-area');
  if (area) {
    resizeCanvas(area.clientWidth, area.clientHeight);
    initSystem();
  }
}

controls.onAction('reset', initSystem);
controls.onChange('text', initSystem);
controls.onChange('density', initSystem);

    }
